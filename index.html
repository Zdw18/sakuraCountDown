<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Sakura Countdown</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="overlay"></div>

  <div class="card">
    <div class="top-row">
      <div class="tag">
        <span class="tag-dot"></span>
        <span id="tagText"></span>
      </div>

      <div class="lang-switcher">
        <select id="langSelect" class="lang-select">
          <option value="zh">中文</option>
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <h1 id="titleText"></h1>
    <p class="subtitle" id="subtitleText"></p>

    <div class="target-date" id="targetText">
      <span class="target-dot"></span>
      …
    </div>

    <div class="input-row">
      <label class="input-label" id="inputLabel" for="targetInput"></label>
      <div class="input-inline">
        <input type="datetime-local" id="targetInput" class="target-input" />
        <button id="applyBtn" class="apply-btn"></button>
      </div>
      <p class="input-helper" id="inputHelper"></p>
    </div>

    <div class="countdown">
      <div class="time-box">
        <div class="time-value" id="days">00</div>
        <div class="time-label" id="daysLabel">天</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="hours">00</div>
        <div class="time-label" id="hoursLabel">小时</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="minutes">00</div>
        <div class="time-label" id="minutesLabel">分钟</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="seconds">00</div>
        <div class="time-label" id="secondsLabel">秒</div>
      </div>
    </div>

    <p class="message" id="message"></p>

    <div class="footer">
      <span id="footerMade"></span>
      <span>·</span>
      <span id="yearText"></span>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
